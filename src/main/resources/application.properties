
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=10MB
server.servlet.session.timeout=30m

# Configuracion para envio de correos
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Configuracion de Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Configuracion de MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/playappdb}
spring.data.mongodb.database=${MONGODB_DATABASE:playappdb}

# Configuracion PlayApp
playapp.admin.email=${PLAYAPP_ADMIN_EMAIL:adminplayapp01@gmail.com}
playapp.admin.password=${PLAYAPP_ADMIN_PASSWORD:admin123}
playapp.payment.mp.access-token=${MP_ACCESS_TOKEN:}
playapp.payment.base-url=${PLAYAPP_BASE_URL:http://localhost:8080}
